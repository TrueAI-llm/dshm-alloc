<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title>dshm-alloc overall architecture</title>
  <desc>Two-layer (L1/L2) distributed chunk allocator over a 128TB shared GVA pool.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <style>
      .box    { fill:#ffffff; stroke:#475569; stroke-width:1.5; }
      .layer  { font-size:14px; font-weight:700; fill:#1e293b; }
      .sub    { font-size:11px; fill:#475569; }
      .edge   { stroke:#475569; stroke-width:1.4; fill:none; }
    </style>
  </defs>

  <!-- ===== User Process ===== -->
  <rect x="20" y="20" width="680" height="420" rx="10" class="box"/>
  <text x="40" y="44" class="layer">User Process</text>

  <!-- Application -->
  <rect x="40" y="60" width="640" height="56" rx="6" class="box" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="360" y="93" class="layer" text-anchor="middle">Application</text>
  <text x="360" y="108" class="sub" text-anchor="middle">shared_malloc()  ⇄  shared_free()</text>
  <line x1="360" y1="116" x2="360" y2="138" class="edge" marker-end="url(#arrow)"/>

  <!-- libdshm_malloc -->
  <rect x="40" y="138" width="640" height="286" rx="8" class="box" fill="#f8fafc"/>
  <text x="60" y="160" class="layer">libdshm_malloc</text>

  <!-- L2 -->
  <rect x="60" y="174" width="600" height="64" rx="6" class="box" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="360" y="200" class="layer" text-anchor="middle">L2 · jemalloc extent_hooks + chunk feeder</text>
  <text x="360" y="220" class="sub" text-anchor="middle">extent_alloc → L1      extent_dalloc → L1_free</text>
  <line x1="360" y1="238" x2="360" y2="262" class="edge" marker-end="url(#arrow)"/>

  <!-- L1 -->
  <rect x="60" y="262" width="600" height="146" rx="6" class="box" fill="#ecfdf5" stroke="#10b981"/>
  <text x="80" y="284" class="layer">L1 · distributed 1GB chunk allocator</text>

  <!-- fast path -->
  <rect x="90" y="300" width="250" height="92" rx="6" class="box"/>
  <text x="215" y="330" class="sub" text-anchor="middle">fast path</text>
  <text x="215" y="350" class="layer" text-anchor="middle">local cache</text>
  <text x="215" y="372" class="sub" text-anchor="middle">4 × 1GB · LIFO</text>

  <!-- slow path -->
  <rect x="380" y="300" width="250" height="92" rx="6" class="box"/>
  <text x="505" y="330" class="sub" text-anchor="middle">slow path</text>
  <text x="505" y="350" class="layer" text-anchor="middle">CAS bitmap</text>
  <text x="505" y="372" class="sub" text-anchor="middle">131072 entries</text>

  <line x1="340" y1="346" x2="380" y2="346" class="edge" marker-end="url(#arrow)"/>
  <text x="360" y="338" class="sub" text-anchor="middle">miss</text>

  <!-- ===== Shared pool ===== -->
  <rect x="20" y="460" width="680" height="80" rx="10" class="box" fill="#eef2ff" stroke="#6366f1"/>
  <text x="40" y="484" class="layer">Shared GVA Pool · 128TB</text>
  <rect x="40" y="496" width="220" height="36" rx="4" class="box"/>
  <text x="150" y="519" class="sub" text-anchor="middle">chunk 0 · metadata</text>
  <rect x="280" y="496" width="400" height="36" rx="4" class="box"/>
  <text x="480" y="519" class="sub" text-anchor="middle">chunk 1 .. 131071 · allocatable 1GB</text>

  <line x1="360" y1="424" x2="360" y2="458" class="edge" marker-end="url(#arrow)"/>
  <text x="368" y="448" class="sub">CAS</text>
</svg>
