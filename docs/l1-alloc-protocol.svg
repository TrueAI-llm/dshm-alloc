<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 640" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title>L1 two-level allocation protocol</title>
  <desc>L1_alloc fast path (local cache) and slow path (global CAS bitmap), with cache refill.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <style>
      .box      { fill:#ffffff; stroke:#475569; stroke-width:1.5; }
      .fast     { fill:#ecfdf5; stroke:#10b981; }
      .slow     { fill:#fffbeb; stroke:#f59e0b; }
      .title    { font-size:14px; font-weight:600; fill:#0f172a; }
      .subtitle { font-size:11px; fill:#475569; }
      .note     { font-size:10px; fill:#475569; }
      .arrow    { stroke:#475569; stroke-width:1.4; fill:none; }
      .loop     { stroke:#6366f1; stroke-width:1.4; fill:none; stroke-dasharray:5 3; }
    </style>
  </defs>

  <!-- entry -->
  <rect x="270" y="16" width="220" height="40" rx="6" class="box"/>
  <text x="380" y="41" class="title" text-anchor="middle">L1_alloc()</text>
  <line x1="380" y1="56" x2="380" y2="80" class="arrow" marker-end="url(#arr)"/>

  <!-- decision -->
  <polygon points="380,80 470,120 380,160 290,120" class="box" fill="#f1f5f9"/>
  <text x="380" y="116" class="subtitle" text-anchor="middle">cache.cnt &gt; 0 ?</text>

  <!-- YES (left) -->
  <line x1="290" y1="120" x2="180" y2="120" class="arrow" marker-end="url(#arr)"/>
  <text x="220" y="112" class="note">yes</text>
  <rect x="40" y="190" width="280" height="120" rx="6" class="box fast"/>
  <text x="60" y="214" class="title">fast path · local cache</text>
  <text x="60" y="234" class="note">lock(cache.lock)</text>
  <text x="60" y="250" class="note">chunk_id = cache.chunk_ids[--cnt]   // LIFO</text>
  <text x="60" y="266" class="note">unlock</text>
  <text x="60" y="286" class="note">VA = pool_base + chunk_id * 1GB</text>
  <line x1="180" y1="120" x2="180" y2="190" class="arrow" marker-end="url(#arr)"/>

  <!-- NO (right) -->
  <line x1="470" y1="120" x2="580" y2="120" class="arrow" marker-end="url(#arr)"/>
  <text x="520" y="112" class="note">no (miss)</text>
  <rect x="440" y="190" width="280" height="120" rx="6" class="box slow"/>
  <text x="460" y="214" class="title">slow path · global CAS bitmap</text>
  <text x="460" y="234" class="note">start = rand() % 131072</text>
  <text x="460" y="250" class="note">scan; skip entries with owner_node ≠ 0</text>
  <text x="460" y="266" class="note">CAS entries[idx]: {0,0} → {node,pid}</text>
  <text x="460" y="286" class="note">timestamps[idx] = clock_ns()</text>
  <line x1="580" y1="120" x2="580" y2="190" class="arrow" marker-end="url(#arr)"/>

  <!-- merge to refill box -->
  <line x1="180" y1="310" x2="380" y2="350" class="arrow" marker-end="url(#arr)"/>
  <line x1="580" y1="310" x2="380" y2="350" class="arrow" marker-end="url(#arr)"/>

  <!-- refill loop -->
  <rect x="180" y="360" width="400" height="120" rx="6" class="box" fill="#eef2ff" stroke="#6366f1"/>
  <text x="200" y="384" class="title">cache refill (amortize CAS cost)</text>
  <text x="200" y="406" class="note">while (cache.cnt &lt; cache.max  and  consec_fail &lt; 8):</text>
  <text x="200" y="422" class="note">    find next FREE slot via scan</text>
  <text x="200" y="438" class="note">    CAS success → push chunk_id to cache, consec_fail = 0</text>
  <text x="200" y="454" class="note">    CAS fail     → consec_fail++</text>
  <text x="200" y="472" class="note">one slow-path entry preheats the whole cache</text>

  <!-- self loop -->
  <path d="M580,420 C640,420 640,400 600,400" class="loop" marker-end="url(#arr)"/>

  <!-- return -->
  <line x1="380" y1="480" x2="380" y2="520" class="arrow" marker-end="url(#arr)"/>
  <rect x="240" y="520" width="280" height="44" rx="6" class="box"/>
  <text x="380" y="547" class="title" text-anchor="middle">return { chunk_id, VA }</text>

  <!-- exhaust -->
  <line x1="580" y1="250" x2="700" y2="250" class="arrow" marker-end="url(#arr)"/>
  <text x="616" y="242" class="note">all occupied</text>
  <rect x="560" y="560" width="180" height="44" rx="6" class="box" fill="#fef2f2" stroke="#ef4444"/>
  <text x="650" y="587" class="title" text-anchor="middle">return -ENOMEM</text>
  <path d="M700,250 C740,250 740,540 650,560" class="arrow" marker-end="url(#arr)"/>
</svg>
